<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공지사항 관리 - 상세</title>

  <link rel="stylesheet" href="/frontend/assets/css/admin/adminNotice/noticeDetail.css" />
</head>
<body>

  <div id="header-wrap"></div>

  <div class="detail-wrap">
    <h1 class="page-title">공지사항 관리</h1>

    <!-- 제목 + 조회수 -->
    <div class="detail-header">
      <div class="detail-title-row">
        <span class="detail-title-label">제목</span>
        <span class="detail-title-text">글제목</span>
      </div>
      <div class="detail-meta">조회수 0</div>
    </div>

    <!-- 본문 -->
    <div class="detail-content-box">게시글 내용</div>

    <!-- 수정 / 삭제 버튼 -->
    <div class="detail-actions">
      <button class="btn btn-blue" id="btnEdit">수정</button>
      <button class="btn btn-red" id="btnDelete">삭제</button>
    </div>

    <!-- 첨부파일 박스 -->
    <div class="attach-box">
      <div>ex) 2026년 대회일정표.pdf</div>
      <div>공지사항의 첨부파일</div>
    </div>
  </div>

  <script>
  fetch("/frontend/header/adminHeader.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("header-wrap").innerHTML = html;
      const s = document.createElement("script");
      s.src = "/frontend/header/adminHeader.js";
      document.body.appendChild(s);
    });
  </script>

  <script src="/frontend/assets/js/admin/adminNotice/noticeData.js"></script>
  <script src="/frontend/assets/js/admin/adminNotice/noticeDetail.js"></script>
</body>
</html>
