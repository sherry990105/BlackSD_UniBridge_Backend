<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멘티 인증페이지</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/frontend/assets/css/header.css" />
    <link rel="stylesheet" href="/frontend/assets/css/footer.css" />
    <link rel="stylesheet" href="/frontend/assets/css/user/mentee/myPage/userManage/userModifyCheck.css">
    <script defer src="/frontend/assets/js/user/mentee/myPage/userManage/userModifyCheck.js"></script>
</head>
<body>
    
    <div id="headerContainer"></div>

    <div class="mainContainer">
        <aside>
            <div class="myPageTitle">마이페이지</div>
            <ul>
                <li><a href="/frontend/html/user/mentee/myPage/myPage.html" class="active">계정 관리</a></li>
                <li><a href="/frontend/html/user/mentee/myPage/userSurvey/userSurvey.html">설문 조사</a></li>
                <li><a href="/frontend/html/user/mentee/myPage/userPayLog/payLog.html">결제 정보</a></li>
                <li><a href="/frontend/html/user/mentee/myPage/userMatching/userMatching.html" >매칭 정보</a></li>
                <li><a href="/frontend/html/user/mentee/myPage/userDelete/userDelete.html">회원탈퇴</a></li>
            </ul>
        </aside>
        <main>
            <div class="userManageTitle">
                <img src="/frontend/assets/img/user/userProfile/userIcon.png" alt="프로필 아이콘">
                <div class="title">계정관리</div>
            </div>
            <div class="userMain">
                <div class="modifyForm">
                    <form action="" id="goUserModify">
                        <div class="inputGroup">
                            <label>현재 비밀번호</label>
                            <input type="text" class="userInput">
                            <div class="spacer"></div>
                        </div>
        
                        <div class="inputGroup">
                            <label>전화번호</label>
                            <input type="tel" class="userInput">
                            <button class="duplication">인증 번호 전송</button>
                        </div>
    
                        <div class="inputGroup">
                            <label>인증번호</label>
                            <input type="text" class="userInput">
                            <button class="duplication">인증 확인</button>
                        </div>
                    </form>
                </div>
            </div>
            <button class="userModifyBtn" form="goUserModify">정보 수정</button>
        </main>

    </div>

    <script src="/frontend/assets/js/header.js"></script>
    <script src="/frontend/assets/js/footer.js"></script>
</body>
</html>
