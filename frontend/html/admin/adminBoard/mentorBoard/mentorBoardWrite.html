<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시판 관리 - 게시글 작성</title>

  <link rel="stylesheet" href="/frontend/assets/css/admin/adminBoard/mentorBoard/boardWrite.css" />
</head>
<body>

  <div id="header-wrap"></div>

  <div class="form-wrap">
    <h1 class="page-title">게시판 관리</h1>

    <h2 class="form-section-title">게시글 작성</h2>
    
    
    <form id="writeForm">
      
      <!-- 제목 입력 -->
      <div class="form-title-row" style="display:block; margin-bottom:16px;">
      <input
      type="text"
      id="inputTitle"
      class="form-title-input"
      style="width:100%;"
      placeholder="제목을 입력해주세요*(최대 50자)"
      maxlength="50"
      />
    </div>
      
    <!-- 내용 입력 -->
    <textarea
    id="inputContent"
    class="form-content-area"
    placeholder=""
    ></textarea>
  
  <!-- 버튼 -->
  <div class="form-actions">
    <button type="submit" class="btn btn-primary" id="btnSubmit">등록</button>
  </div>

</form>

<script>
  fetch("/frontend/header/adminHeader.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("header-wrap").innerHTML = html;
      const s = document.createElement("script");
      s.src = "/frontend/header/adminHeader.js";
      document.body.appendChild(s);
    });
</script>
  <script src="/frontend/assets/js/admin/adminBoard/boardData.js"></script>
  <script src="/frontend/assets/js/admin/adminBoard/mentorBoard/boardWrite.js"></script>
</body>
</html>
