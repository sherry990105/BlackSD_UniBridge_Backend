<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미정 수정페이지</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/frontend/assets/css/header.css" />
    <link rel="stylesheet" href="/frontend/assets/css/footer.css" />
    <link rel="stylesheet" href="/frontend/assets/css/user/undetermined/myPage/userManage/userModify.css">
    <script defer src="/frontend/assets/js/user/undetermined/myPage/userManage/userModify.js"></script>
</head>
<body>
    
    <div id="headerContainer"></div>

    <div class="mainContainer">
        <aside>
            <div class="myPageTitle">마이페이지</div>
            <ul>
                <li><a href="/frontend/html/user/undetermined/myPage/myPage.html" class="active">계정 관리</a></li>
                <li><a href="/frontend/html/user/undetermined/myPage/userSurvey/userSurvey.html">설문 조사</a></li>
                <li><a href="/frontend/html/user/undetermined/myPage/userDelete/userDelete.html">회원 탈퇴</a></li>
            </ul>
        </aside>
        <main>
            <div class="userManageTitle">
                <img src="/frontend/assets/img/user/userProfile/userIcon.png" alt="프로필 아이콘">
                <div class="title">계정관리</div>
            </div>
            <div class="userMain">
                <div class="userImg">
                    <img src="/frontend/assets/img/user/userProfile/ex1.png" alt="유저의 프로필 사진">
                    <button id="imgBtn">사진 변경</button>
                    <div class="errorMsg"></div>
                </div>
                <div class="modifyForm">
                    <div class="inputGroup">
                        <label>이름</label>
                        <label>홍길동</label>
                        <div class="spacer"></div>
                        <div class="spacer"></div>
                    </div>
    
                    <div class="inputGroup">
                        <label>아이디</label>
                        <label>hongdong11</label>
                        <div class="spacer"></div>
                        <div class="spacer"></div>
                    </div>

                    <div class="inputGroup">
                        <label>닉네임</label>
                        <input type="text" class="userInput">
                        <button class="duplication">중복확인</button>
                        <button class="change">변경</button>
                        <div class="errorMsg"></div>
                    </div>

                    <div class="inputGroup">
                        <label>변경할 비밀번호</label>
                        <input type="text" class="userInput">
                        <div class="spacer"></div>
                        <div class="spacer"></div>
                    </div>

                    <div class="inputGroup">
                        <label>비밀번호 확인</label>
                        <input type="password" class="userInput">
                        <button class="duplication">확인</button>
                        <button class="change">변경</button>
                        <div class="errorMsg"></div>
                    </div>

                    <div class="inputGroup">
                        <label>전화번호</label>
                        <input type="text" class="userInput">
                        <button class="authBtn">인증번호전송</button>
                        <div class="spacer2"></div>
                        <div class="errorMsg"></div>
                    </div>

                    <div class="inputGroup">
                        <label>인증번호</label>
                        <input type="text" class="userInput">
                        <button class="duplication">확인</button>
                        <button class="change">전화번호변경</button>
                        <div class="errorMsg"></div>
                    </div>

                    <div class="inputGroup">
                        <label>성별</label>
                        <div class="radioGroup">
                            <span class="radioItem">
                                <span>남성</span> <input type="radio" value="m" name="role" class="radioUserType"> 
                            </span>
                            <span class="radioItem">
                                <span>여성</span> <input type="radio" value="f" name="role" class="radioUserType"> 
                            </span>
                            <span class="radioItem">
                                <span>선택안함</span> <input type="radio" value="none" name="role" class="radioUserType" checked> 
                            </span>
                        </div>
                        <button class="change">변경</button>
                    </div>
                </div>
            </div>
            <button class="userModifyBtn">완료</button>
        </main>
    </div>

    <script src="/frontend/assets/js/header.js"></script>
    <script src="/frontend/assets/js/footer.js"></script>
</body>
</html>
