<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/frontend/assets/css/header.css" />
    <link rel="stylesheet" href="/frontend/assets/css/footer.css" />
    <link rel="stylesheet" href="/frontend/assets/css/user/siginIn/login.css">
    <script defer src="/frontend/assets/js/user/siginIn/login.js"></script>
</head>
<body>
    
    <div id="headerContainer"></div>

    <main>
        <div class="content">
            <div class="loginBox">
                <div class="loginTitle">로그인</div>
                <form action="" id="login">
                    <div class="inputGroup">
                        <label>아이디</label>
                        <input type="text" id="userId" class="userInput">
                    </div>

                    <div class="inputGroup">
                        <label>비밀번호</label>
                        <input type="password" id="userPw" class="userInput">
                    </div>

                    <div id="errorMsg" class="errorMsg"></div>

                    <button type="submit" class="loginBtn">로그인</button>
                </form>

                <a href="/frontend/html/user/siginUp/terms.html"><div class="signup">회원가입</div></a>
            </div>
        </div>
    </main>

    <script src="/frontend/assets/js/header.js"></script>
    <script src="/frontend/assets/js/footer.js"></script>
</body>
</html>
