<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/frontend/assets/css/global.css">
    <link rel="stylesheet" href="/frontend/assets/css/fonts.css">
    <link rel="stylesheet" href="/frontend/assets/css/admin/adminMatching/matchingDetail.css">
    <title>Document</title>
</head>
<body>
  <div id="root">
    <div class="root-container">
      <div id="header-wrap"></div>
      <div class="content-container">
        <div class="title-container">
          <span>매칭 취소 상세</span>
        </div>
        <div class="matching-user-container">
          <div class="matching-user-container__inner">
            <div class="matching-date">2026.03.03 (화) 14:32</div>
            <div class="vertical-line"></div>
            <div class="match-config-container">
              <div class="status">취소 신청 중</div>
              <div class="vertical-line"></div>
              <div class="match-config-content">
                <div class="mentee">
                  <div class="mentee-icon"></div>
                  <div class="mentee-title">멘티</div>
                  <div class="mentee-title-name">멘티이름1</div>
                </div>
                <span class="arrow"></span>
                <div class="mentor">
                  <div class="mentor-icon"></div>
                  <div class="mentor-title">멘토</div>
                  <div class="mentor-title-name">멘토이름1</div>
                </div>
              </div>
            </div>
            <div class="match-config-detail-container">
              <div class="match-config-detail-title">취소 신청 정보</div>
              <div class="match-config-detail-content">
                <div class="match-config-detail-content__inner">
                  <div class="match-apply-date-container">
                    <div class="match-apply-date-title">신청 일시</div>
                    <div class="match-apply-date-content">2025.11.15</div>
                  </div>
                  <div class="match-cancel-desc-container">
                    <div      class="match-cancel-desc-title">신청 일시</div>
                    <textarea class="match-cancel-desc-content"
                      placeholder="ex) 개인 사정으로 인해 학습 일정을 이어가기 어려워 취소를 신청합니다. 추후 재매칭 의사가 있습니다."
                    ></textarea>
                  </div>
                  <div class="match-cancel-button-container">
                    <div class="match-cancel-button">매칭 취소</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    fetch("/frontend/header/adminHeader.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("header-wrap").innerHTML = html;
        const s = document.createElement("script");
        s.src = "/frontend/header/adminHeader.js";
        document.body.appendChild(s);
      });
  </script>
</body>
</html>
