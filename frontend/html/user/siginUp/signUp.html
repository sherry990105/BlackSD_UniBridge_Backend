<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/frontend/assets/css/header.css" />
    <link rel="stylesheet" href="/frontend/assets/css/footer.css" />
    <link rel="stylesheet" href="/frontend/assets/css/user/siginUp/signUp.css">
    <script defer src="/frontend/assets/js/user/siginUp/signUp.js"></script>
</head>

<body>
    
    <div id="headerContainer"></div>

    <main>
        <div class="content">
            <div class="signUpBox">
                <div class="signUpTitle">회원가입</div>

                <form action="" id="signUpForm">
                    <div class="inputGroup">
                        <label>아이디</label>
                        <input type="text" class="userInput">
                        <button class="duplication">중복확인</button>
                    </div>

                    <div class="inputGroup">
                        <label>비밀번호</label>
                        <input type="password" class="userInput">
                        <div class="spacer"></div>
                    </div>

                    <div class="inputGroup">
                        <label>비밀번호 확인</label>
                        <input type="password" class="userInput">
                        <button class="duplication">확인</button>
                    </div>

                    <div class="inputGroup">
                        <label>이름</label>
                        <input type="text" class="userInput">
                        <div class="spacer"></div>
                    </div>

                    <div class="inputGroup">
                        <label>닉네임</label>
                        <input type="text" class="userInput">
                        <button class="duplication">중복확인</button>
                    </div>

                    <div class="inputGroup">
                        <label>전화번호</label>
                        <input type="text" class="userInput">
                        <button class="duplication">인증발송</button>
                    </div>

                    <div class="inputGroup">
                        <label>인증번호</label>
                        <input type="text" class="userInput">
                        <button class="duplication">인증확인</button>
                    </div>

                    <div class="inputGroup">
                        <label>성별</label>
                        남성 <input type='radio' name='gender' value='male' class="genderBtn" />
                        여성 <input type='radio' name='gender' value='female' class="genderBtn"/>
                        선택안함 <input type='radio' name='gender' value='none' class="genderBtn" checked />
                    </div>
                    <button type="submit" class="signUpBtn">회원가입</button>
                </form>
            </div>
        </div>
    </main>

    <script src="/frontend/assets/js/header.js"></script>
    <script src="/frontend/assets/js/footer.js"></script>
</body>

</html>
